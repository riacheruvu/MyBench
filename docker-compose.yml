services:
  openclaw-gateway:
    build:
      context: .
      dockerfile: docker/gateway.Dockerfile
    image: alignharness-openclaw-gateway:local
    user: "0:0"
    init: true
    restart: unless-stopped
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"
      - "${OPENCLAW_BRIDGE_PORT:-18790}:18790"
    environment:
      CONFIG_PATH: /home/node/.openclaw/openclaw.json
      HOME: /home/node
      TERM: xterm-256color
      TZ: ${OPENCLAW_TZ:-America/Denver}
      OPENCLAW_GATEWAY_PORT: ${OPENCLAW_GATEWAY_PORT:-18789}
      OPENCLAW_GATEWAY_BIND: ${OPENCLAW_GATEWAY_BIND:-lan}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-change-me}
      OPENCLAW_DISABLE_BONJOUR: ${OPENCLAW_DISABLE_BONJOUR:-1}
      OPENCLAW_SANDBOX_IMAGE: ${OPENCLAW_SANDBOX_IMAGE:-alignharness-openclaw-sandbox:local}
      OPENCLAW_SANDBOX_MODE: ${OPENCLAW_SANDBOX_MODE:-all}
      OPENCLAW_SANDBOX_SCOPE: ${OPENCLAW_SANDBOX_SCOPE:-session}
      OPENCLAW_SANDBOX_WORKSPACE_ACCESS: ${OPENCLAW_SANDBOX_WORKSPACE_ACCESS:-none}
      OPENCLAW_SANDBOX_NETWORK: ${OPENCLAW_SANDBOX_NETWORK:-bridge}
      ALIGNHARNESS_PROVIDER: ${ALIGNHARNESS_PROVIDER:-llamacpp}
      ALIGNHARNESS_MODEL: ${ALIGNHARNESS_MODEL:-}
      ALIGNHARNESS_JUDGE_PROVIDER: ${ALIGNHARNESS_JUDGE_PROVIDER:-}
      ALIGNHARNESS_JUDGE_MODEL: ${ALIGNHARNESS_JUDGE_MODEL:-}
      ALIGNHARNESS_LLAMACPP_URL: ${ALIGNHARNESS_LLAMACPP_URL:-http://host.docker.internal:8080}
      ALIGNHARNESS_LLAMACPP_API_KEY: ${ALIGNHARNESS_LLAMACPP_API_KEY:-}
      ALIGNHARNESS_REPEAT: ${ALIGNHARNESS_REPEAT:-1}
      ALIGNHARNESS_LOCAL_FAST: ${ALIGNHARNESS_LOCAL_FAST:-1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - ./.openclaw-local:/home/node/.openclaw
      - .:/home/node/.openclaw/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  openclaw-cli:
    image: alignharness-openclaw-gateway:local
    user: "0:0"
    network_mode: "service:openclaw-gateway"
    stdin_open: true
    tty: true
    init: true
    depends_on:
      - openclaw-gateway
    environment:
      HOME: /home/node
      TERM: xterm-256color
      TZ: ${OPENCLAW_TZ:-America/Denver}
      BROWSER: echo
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-change-me}
      OPENCLAW_DISABLE_BONJOUR: ${OPENCLAW_DISABLE_BONJOUR:-1}
      ALIGNHARNESS_PROVIDER: ${ALIGNHARNESS_PROVIDER:-llamacpp}
      ALIGNHARNESS_MODEL: ${ALIGNHARNESS_MODEL:-}
      ALIGNHARNESS_JUDGE_PROVIDER: ${ALIGNHARNESS_JUDGE_PROVIDER:-}
      ALIGNHARNESS_JUDGE_MODEL: ${ALIGNHARNESS_JUDGE_MODEL:-}
      ALIGNHARNESS_LLAMACPP_URL: ${ALIGNHARNESS_LLAMACPP_URL:-http://host.docker.internal:8080}
      ALIGNHARNESS_LLAMACPP_API_KEY: ${ALIGNHARNESS_LLAMACPP_API_KEY:-}
      ALIGNHARNESS_REPEAT: ${ALIGNHARNESS_REPEAT:-1}
      ALIGNHARNESS_LOCAL_FAST: ${ALIGNHARNESS_LOCAL_FAST:-1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - ./.openclaw-local:/home/node/.openclaw
      - .:/home/node/.openclaw/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: ["node", "dist/index.js"]

  # -- llama.cpp server (optional) --------------------------------------------
  # Profile: llama
  # Usage:   docker compose --profile llama up -d
  #
  # Runs llama-server inside Docker as an alternative to running it on the host.
  # The gateway and sandbox containers reach it via http://llama-server:8080
  # (set ALIGNHARNESS_LLAMACPP_URL=http://llama-server:8080 in .env when using this).
  #
  # Mount your models directory and set ALIGNHARNESS_MODEL_FILE to the filename.
  llama-server:
    image: ghcr.io/ggml-org/llama.cpp:server
    profiles: ["llama"]
    ports:
      - "${LLAMACPP_PORT:-8080}:8080"
    volumes:
      - ${ALIGNHARNESS_MODELS_DIR:-./models}:/models:ro
    command: >
      -m /models/${ALIGNHARNESS_MODEL_FILE:-model.gguf}
      --host 0.0.0.0
      --port 8080
      --ctx-size ${ALIGNHARNESS_CTX_SIZE:-2048}
      --threads ${ALIGNHARNESS_N_THREADS:-4}
      --n-gpu-layers ${ALIGNHARNESS_N_GPU_LAYERS:-0}

  openclaw-sandbox-image:
    build:
      context: .
      dockerfile: docker/sandbox.Dockerfile
    image: alignharness-openclaw-sandbox:local
    profiles: ["build-only"]
